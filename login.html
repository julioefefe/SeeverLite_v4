<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SeederLinux Lite - Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/assets/css/style.css">
</head>
<body>
<div class="login-page">
    <div class="login-card card">
        <div class="card-body">
            <div class="login-logo">
                <img src="/assets/images/logos/seederlinux-logo.svg" alt="SeederLinux" onerror="this.style.display='none'">
                <div class="login-logo-text">
                    <div class="brand">SeederLinux Lite</div>
                    <div class="sub">Sistema de Configuracao</div>
                </div>
            </div>

            <form id="login-form">
                <div class="form-group">
                    <label class="form-label">Usuario</label>
                    <input type="text" id="login-user" class="form-input" required autofocus>
                </div>
                <div class="form-group">
                    <label class="form-label">Senha</label>
                    <input type="password" id="login-pass" class="form-input" required>
                </div>
                <button type="submit" class="btn btn-primary btn-lg w-full">Entrar</button>
                <div id="login-error" class="login-error hidden"></div>
            </form>
        </div>
    </div>
</div>

<script>
const API = {
    post: async (action, data) => {
        const url = new URL('/api/', location.origin);
        url.searchParams.set('action', action);
        return (await fetch(url, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(data),
            credentials: 'same-origin'
        })).json();
    }
};

document.getElementById('login-form').addEventListener('submit', async e => {
    e.preventDefault();
    const errEl = document.getElementById('login-error');
    errEl.classList.add('hidden');

    const res = await API.post('login', {
        username: document.getElementById('login-user').value,
        password: document.getElementById('login-pass').value
    });

    if (res.success) {
        location.href = '/admin.html';
    } else {
        errEl.textContent = res.error || 'Erro ao autenticar';
        errEl.classList.remove('hidden');
    }
});
</script>
</body>
</html>
