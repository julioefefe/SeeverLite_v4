<!DOCTYPE html>
<html lang="pt-BR">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Login - SeederLinux Lite</title><script src="https://cdn.tailwindcss.com"></script><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"></head>
<body class="min-h-screen bg-gradient-to-br from-slate-900 via-slate-800 to-slate-900 flex items-center justify-center p-4 font-sans">
<div class="w-full max-w-md">
<div class="bg-slate-800/80 backdrop-blur-sm rounded-2xl shadow-2xl border border-slate-700 p-8">
<div class="text-center mb-8">
<div class="flex justify-center mb-4">
<img src="assets/images/seederlinux-logo.svg" alt="SeederLinux" class="logo-img-login" onerror="this.style.display='none'">
</div>
<h1 class="text-2xl font-bold text-white">SeederLinux Lite</h1>
<p class="text-slate-400 text-sm mt-1">Sistema de Gerenciamento de Estacoes</p>
</div>

<form id="login-form" class="space-y-6">
<div>
<label class="block text-sm font-medium text-slate-300 mb-2">Usuario</label>
<input type="text" id="username" required autocomplete="username" class="w-full px-4 py-3 bg-slate-900 border border-slate-700 rounded-lg text-white placeholder-slate-500 focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500" placeholder="Digite seu usuario">
</div>
<div>
<label class="block text-sm font-medium text-slate-300 mb-2">Senha</label>
<input type="password" id="password" required autocomplete="current-password" class="w-full px-4 py-3 bg-slate-900 border border-slate-700 rounded-lg text-white placeholder-slate-500 focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500" placeholder="Digite sua senha">
</div>
<button type="submit" id="btn-login" class="w-full py-3 bg-gradient-to-r from-blue-600 to-emerald-600 hover:from-blue-700 hover:to-emerald-700 text-white font-semibold rounded-lg transition-all transform hover:scale-[1.02] focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2 focus:ring-offset-slate-800">
Entrar
</button>
</form>

<div id="error-message" class="hidden mt-4 p-3 bg-red-500/20 border border-red-500/50 rounded-lg text-red-400 text-sm text-center"></div>
</div>

<div class="text-center mt-6 text-slate-500 text-xs">
SeederLinux Lite - Gerenciamento de Configuracoes
</div>
</div>

<script>
const API = {
    post: async (action, data) => {
        const url = new URL('/api/', location.origin);
        url.searchParams.set('action', action);
        const res = await fetch(url, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(data),
            credentials: 'same-origin'
        });
        return res.json();
    }
};

document.getElementById('login-form').addEventListener('submit', async (e) => {
    e.preventDefault();

    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value;
    const btn = document.getElementById('btn-login');
    const errorEl = document.getElementById('error-message');

    if (!username || !password) {
        errorEl.textContent = 'Preencha todos os campos';
        errorEl.classList.remove('hidden');
        return;
    }

    btn.disabled = true;
    btn.textContent = 'Entrando...';
    errorEl.classList.add('hidden');

    try {
        const res = await API.post('login', { username, password });

        if (res.success) {
            window.location.href = '/admin.html';
        } else {
            errorEl.textContent = res.error || 'Credenciais invalidas';
            errorEl.classList.remove('hidden');
            btn.disabled = false;
            btn.textContent = 'Entrar';
        }
    } catch (err) {
        errorEl.textContent = 'Erro de conexao. Tente novamente.';
        errorEl.classList.remove('hidden');
        btn.disabled = false;
        btn.textContent = 'Entrar';
    }
});

(async () => {
    try {
        const url = new URL('/api/', location.origin);
        url.searchParams.set('action', 'session');
        const res = await fetch(url, { credentials: 'same-origin' });
        const data = await res.json();
        if (data.success) {
            window.location.href = '/admin.html';
        }
    } catch (e) {}
})();
</script>
</body>
</html>
