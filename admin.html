<!DOCTYPE html>
<html lang="pt-BR">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Admin - SeederLinux Lite</title><script src="https://cdn.tailwindcss.com"></script><link rel="stylesheet" href="assets/css/style.css"><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"></head>
<body class="min-h-screen bg-slate-900 text-slate-200 font-sans">
<div class="flex h-screen overflow-hidden">
<aside class="w-64 bg-slate-800 border-r border-slate-700 flex flex-col">
<div class="p-4 border-b border-slate-700"><div class="flex items-center gap-3">
<div class="w-10 h-10 flex items-center justify-center"><img src="assets/images/seederlinux-logo.png" alt="SeederLinux" class="logo-img" onerror="this.src='assets/images/seederlinux-logo.svg'"></div>
<div><span class="text-lg font-bold text-white">SeederLinux</span><span class="block text-xs text-slate-400">Admin</span></div>
</div></div>
<div class="flex-1 overflow-y-auto p-3">
<div class="mb-4"><span class="text-xs font-semibold text-slate-400 uppercase">Navegacao</span><nav class="space-y-1 mt-2">
<button class="nav-main w-full flex items-center gap-3 px-3 py-2 rounded-lg text-slate-300 hover:bg-slate-700 text-left active bg-slate-700 text-white" onclick="document.getElementById('view-om-detail').classList.add('hidden');document.getElementById('view-dashboard').classList.remove('hidden')"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>Dashboard</button>
</nav></div>
<div id="orgs-section"><div class="flex items-center justify-between mb-3"><span class="text-xs font-semibold text-slate-400 uppercase">Organizacoes</span><button id="btn-new-org" class="p-1 text-slate-400 hover:text-white hover:bg-slate-700 rounded"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg></button></div><nav id="om-list" class="space-y-1"></nav></div>
</div>
<div class="p-4 border-t border-slate-700"><div class="flex items-center justify-between"><div class="flex items-center gap-3"><div class="w-8 h-8 bg-blue-600 rounded-full flex items-center justify-center text-white font-semibold text-sm"><span id="user-initial">A</span></div><div><div class="text-sm font-medium text-white" id="user-name">Admin</div><div class="text-xs text-slate-400" id="user-role">Admin GAP</div></div></div><button id="btn-logout" class="text-slate-400 hover:text-red-400"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg></button></div></div>
</aside>
<main class="flex-1 overflow-y-auto">
<header class="bg-slate-800/50 border-b border-slate-700 px-6 py-4 sticky top-0 z-10"><div><h1 class="text-2xl font-bold text-white" id="page-title">Dashboard</h1><p class="text-slate-400 text-sm" id="page-subtitle">Visao geral</p></div></header>
<div class="p-6">
<div id="view-dashboard">
<div class="grid grid-cols-3 gap-4 mb-6">
<div class="bg-slate-800 rounded-xl p-5 border border-slate-700"><div class="text-2xl font-bold text-white" id="dash-orgs">-</div><div class="text-slate-400 text-xs mt-1">Organizacoes</div></div>
<div class="bg-slate-800 rounded-xl p-5 border border-slate-700"><div class="text-2xl font-bold text-white" id="dash-scripts">-</div><div class="text-slate-400 text-xs mt-1">Scripts</div></div>
<div class="bg-slate-800 rounded-xl p-5 border border-slate-700"><div class="text-2xl font-bold text-white" id="dash-vars">-</div><div class="text-slate-400 text-xs mt-1">Variaveis</div></div>
</div>
</div>
<div id="view-om-detail" class="hidden">
<div class="mb-6 flex items-center gap-4"><div class="w-16 h-16 bg-gradient-to-br from-blue-500 to-emerald-500 rounded-xl flex items-center justify-center text-white font-bold text-xl" id="om-badge">OM</div><div class="flex-1"><h2 class="text-2xl font-bold text-white" id="om-display-name">Nome</h2><p class="text-slate-400" id="om-domain">dominio</p></div></div>
<div class="border-b border-slate-700 mb-6"><nav class="flex gap-4"><button class="tab-btn active px-4 py-2 text-sm font-medium border-b-2 border-blue-500 text-blue-400" data-tab="variables" onclick="switchTab('variables')">Variaveis</button><button class="tab-btn px-4 py-2 text-sm font-medium border-b-2 border-transparent text-slate-400" data-tab="bundle" onclick="switchTab('bundle')">Bundle</button></nav></div>
<div id="tab-variables" class="tab-content"><div class="bg-slate-800 rounded-xl border border-slate-700"><div class="px-6 py-4 border-b border-slate-700 flex justify-between"><h3 class="font-semibold text-white">Variaveis</h3><button id="btn-save-vars" class="px-4 py-2 bg-emerald-600 hover:bg-emerald-700 rounded-lg text-sm font-medium text-white">Salvar</button></div><div class="p-6"><div id="vars-list"></div></div></div></div>
<div id="tab-bundle" class="tab-content hidden"><div class="bg-slate-800 rounded-xl border border-slate-700 p-6"><button id="btn-generate-bundle" class="px-6 py-3 bg-gradient-to-r from-blue-600 to-emerald-600 hover:from-blue-700 hover:to-emerald-700 rounded-lg font-semibold text-white">Gerar Bundle</button></div></div>
</div>
</div>
</main>
</div>
<div id="modal-new-org" class="fixed inset-0 z-50 hidden"><div class="absolute inset-0 bg-black/60" onclick="closeModal('modal-new-org')"></div><div class="relative flex items-center justify-center min-h-screen p-4"><div class="bg-slate-800 rounded-2xl border border-slate-700 w-full max-w-lg"><div class="px-6 py-4 border-b border-slate-700 flex justify-between"><h3 class="font-semibold text-white text-lg">Nova Organizacao</h3><button class="modal-close text-slate-400 hover:text-white text-2xl">&times;</button></div><form id="new-org-form" class="p-6 space-y-4"><div><label class="block text-sm font-medium text-slate-300 mb-2">Nome *</label><input type="text" id="new-org-name" required class="w-full px-4 py-3 bg-slate-900 border border-slate-700 rounded-lg text-white"></div><div class="grid grid-cols-2 gap-4"><div><label class="block text-sm font-medium text-slate-300 mb-2">Sigla *</label><input type="text" id="new-org-acronym" required class="w-full px-4 py-3 bg-slate-900 border border-slate-700 rounded-lg text-white uppercase"></div><div><label class="block text-sm font-medium text-slate-300 mb-2">Dominio</label><input type="text" id="new-org-domain" class="w-full px-4 py-3 bg-slate-900 border border-slate-700 rounded-lg text-white"></div></div><div class="flex justify-end gap-3 pt-4"><button type="button" class="modal-close px-4 py-2 bg-slate-700 hover:bg-slate-600 rounded-lg text-sm font-medium text-white">Cancelar</button><button type="submit" class="px-4 py-2 bg-blue-600 hover:bg-blue-700 rounded-lg text-sm font-medium text-white">Criar</button></div></form></div></div></div>
<div id="toast-container" class="fixed bottom-4 right-4 z-50 space-y-2"></div>
<script src="assets/js/admin.js"></script>
</body>
</html>
